<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Saldo - Logia 122</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; }
        header { text-align: center; padding: 20px; background-color: #fff; border-bottom: 3px solid #2c3e50; margin-bottom: 30px; }
        .container { width: 90%; max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { font-size: 1.2rem; color: #2c3e50; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; cursor: pointer; border: none; border-radius: 4px; transition: 0.3s; }
        .btn-buscar { background-color: #2c3e50; color: white; }
        .btn-buscar:hover { background-color: #34495e; }
        .btn-limpiar { background-color: #e0e0e0; color: #333; }
        .btn-limpiar:hover { background-color: #d0d0d0; }
        #out { margin-top: 20px; font-size: 18px; line-height: 1.6; border-top: 1px solid #eee; padding-top: 15px; }
        #error { color: #d32f2f; margin-top: 10px; font-weight: bold; }
        .destaque { font-weight: bold; color: #2c3e50; }
        .pago-valor { font-weight: bold; color: #2e7d32; } /* Verde para pagos */
        .deuda-valor { font-weight: bold; color: #d32f2f; } /* Rojo para deuda */
        
        .archivo-info { 
            margin-top: 25px; 
            font-size: 0.75rem; 
            color: #7f8c8d; 
            text-align: center; 
            border-top: 1px dashed #ccc; 
            padding-top: 15px;
        }
    </style>
    <script>
        let data = [];

        async function cargarCSV() {
            try {
                const url = 'tesoreria.csv?t=' + Date.now();
                const resp = await fetch(url);
                if (!resp.ok) throw new Error("No se pudo cargar el archivo");

                const lastModifiedHeader = resp.headers.get('Last-Modified');
                if (lastModifiedHeader) {
                    const fechaArchivo = new Date(lastModifiedHeader);
                    const opciones = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
                    document.getElementById('info-csv').innerText = "Datos actualizados al: " + fechaArchivo.toLocaleString('es-CL', opciones);
                }

                const txt = await resp.text();
                const filas = txt.trim().split("\n");
                const headers = filas[0].split(";").map(h => h.trim());
                
                return filas.slice(1).map(row => {
                    const columnas = row.split(";");
                    let objeto = {};
                    headers.forEach((h, i) => {
                        objeto[h] = columnas[i] ? columnas[i].trim() : "";
                    });
                    
                    // Procesar valores numéricos
                    let saldo = parseInt(objeto['Saldo Vencido']) || 0;
                    objeto['Deuda Vencida'] = saldo > 0 ? saldo : 0;
                    
                    let pagos = parseInt(objeto['Pagos Realizados 2026']) || 0;
                    objeto['Pagos 2026'] = pagos;
                    
                    return objeto;
                });
            } catch (e) {
                console.error("Error:", e);
                document.getElementById('error').innerHTML = 'Error al conectar con la base de datos.';
                return [];
            }
        }

        function limpiarRutParaProcesar(r) {
            return r ? r.toString().replace(/[^0-9kK]/g, '').toUpperCase() : "";
        }

        function formatearRut(r) {
            let rutLimpio = limpiarRutParaProcesar(r);
            if (rutLimpio.length <= 1) return rutLimpio;
            let result = "-" + rutLimpio.slice(-1);
            let cuerpo = rutLimpio.slice(0, -1);
            while (cuerpo.length > 3) {
                result = "." + cuerpo.slice(-3) + result;
                cuerpo = cuerpo.slice(0, -3);
            }
            return cuerpo + result;
        }

        function formatearInputRut(e) {
            const input = e.target;
            let posCursor = input.selectionStart;
            let valorAntes = input.value;
            input.value = formatearRut(input.value);
            let dif = input.value.length - valorAntes.length;
            input.setSelectionRange(posCursor + dif, posCursor + dif);
        }

        async function buscar() {
            if (data.length === 0) data = await cargarCSV();
            const rutInput = document.getElementById('rut').value.trim();
            const errorDiv = document.getElementById('error');
            const outDiv = document.getElementById('out');
            
            errorDiv.innerHTML = '';
            outDiv.innerHTML = '';

            if (limpiarRutParaProcesar(rutInput).length < 8) {
                errorDiv.innerHTML = 'Ingrese un RUT válido para consultar.';
                return;
            }

            const rutBuscar = limpiarRutParaProcesar(rutInput);
            const soloNumeros = rutBuscar.slice(0, -1);

            const resultado = data.find(x => {
                const rutCsv = limpiarRutParaProcesar(x.RUT);
                return rutCsv === rutBuscar || rutCsv === soloNumeros;
            });

            if (resultado) {
                outDiv.innerHTML = `
                    <strong>Nombre:</strong> ${resultado.Nombres} ${resultado['Apellido Paterno']}<br>
                    <strong>Cuotas:</strong> <span class="destaque">${resultado['Cuotas'] || '0'}</span><br>
                    <strong>Pagos Realizados 2026:</strong> <span class="pago-valor">$${(resultado['Pagos 2026'] || 0).toLocaleString('es-CL')}</span><br>
                    <strong>Deuda Vencida:</strong> <span class="deuda-valor">$${resultado['Deuda Vencida'].toLocaleString('es-CL')}</span>
                `;
            } else {
                outDiv.innerHTML = '<span style="color: #666;">El RUT no se encuentra en los registros.</span>';
            }
        }

        function limpiar() {
            document.getElementById('rut').value = '';
            document.getElementById('error').innerHTML = '';
            document.getElementById('out').innerHTML = '';
        }

        window.onload = async () => {
            data = await cargarCSV();
            document.getElementById('rut').addEventListener('input', formatearInputRut);
        };
    </script>
</head>
<body>

<header>
    <img width="120" src="Logo.jpg" alt="Logo Logia 122" onerror="this.style.display='none'">
    <h2>Respetable Logia Adeodato García Valenzuela N°122</h2>
    <p>Módulo de Consulta de Saldo</p>
</header>

<div class="container">
    <input type="text" id="rut" placeholder="RUT (ej: 12.345.678-K)" spellcheck="false">
    <button class="btn-buscar" onclick="buscar()">Consultar</button>
    <button class="btn-limpiar" onclick="limpiar()">Nueva Consulta</button>
    
    <div id="error"></div>
    <div id="out"></div>

    <div id="info-csv" class="archivo-info">Cargando fecha de actualización...</div>
</div>

</body>
</html>
