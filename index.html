<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Saldo - Logia 122</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; }
        header { text-align: center; padding: 20px; background-color: #fff; border-bottom: 3px solid #2c3e50; margin-bottom: 30px; }
        .container { width: 90%; max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { font-size: 1.2rem; color: #2c3e50; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; cursor: pointer; border: none; border-radius: 4px; transition: 0.3s; }
        .btn-buscar { background-color: #2c3e50; color: white; }
        .btn-buscar:hover { background-color: #34495e; }
        .btn-limpiar { background-color: #e0e0e0; color: #333; }
        .btn-limpiar:hover { background-color: #d0d0d0; }
        #out { margin-top: 20px; font-size: 18px; line-height: 1.6; border-top: 1px solid #eee; padding-top: 15px; }
        #error { color: #d32f2f; margin-top: 10px; font-weight: bold; }
        .pago-valor { font-weight: bold; color: #2e7d32; }
        .deuda-valor { font-weight: bold; color: #d32f2f; }
        
        .archivo-info { 
            margin-top: 25px; 
            font-size: 0.75rem; 
            color: #7f8c8d; 
            text-align: center; 
            border-top: 1px dashed #ccc; 
            padding-top: 15px;
        }
    </style>
    <script>
        let data = [];

        async function cargarCSV() {
            try {
                const url = 'tesoreria.csv?t=' + Date.now();
                const resp = await fetch(url);
                if (!resp.ok) throw new Error("No se pudo cargar");

                const lastModifiedHeader = resp.headers.get('Last-Modified');
                if (lastModifiedHeader) {
                    const fechaArchivo = new Date(lastModifiedHeader);
                    const opciones = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
                    document.getElementById('info-csv').innerText = "Datos actualizados al: " + fechaArchivo.toLocaleString('es-CL', opciones);
                }

                const txt = await resp.text();
                const filas = txt.trim().split("\n");
                
                return filas.slice(1).map(row => {
                    const columnas = row.split(";");
                    
                    // Asignación por posición según tu archivo CSV
                    // Col A (0): RUT | Col B (1): Apellido P | Col C (2): Nombres 
                    // Col D (3): Pagos individuales | Col E (4): SUMA PAGOS | Col F (5): Saldo Vencido
                    
                    let rutOriginal = columnas[0] ? columnas[0].trim() : "";
                    let apellido = columnas[1] ? columnas[1].trim() : "";
                    let nombre = columnas[2] ? columnas[2].trim() : "";
                    
                    // Columna E (Indice 4): Suma de pagos realizados
                    let pagosSumaVal = columnas[4] ? columnas[4].trim() : "0";
                    let pagosSumaNum = parseInt(pagosSumaVal.replace(/\./g, '')) || 0;

                    // Columna F (Indice 5): Saldo Vencido
                    let saldoVal = columnas[5] ? columnas[5].trim() : "0";
                    let saldoNum = parseInt(saldoVal.replace(/\./g, '')) || 0;
                    
                    return {
                        rut: rutOriginal,
                        nombreCompleto: `${nombre} ${apellido}`,
                        pagos: pagosSumaNum,
                        deuda: saldoNum
                    };
                });
            } catch (e) {
                console.error("Error:", e);
                document.getElementById('error').innerHTML = 'Error al leer la base de datos.';
                return [];
            }
        }

        function limpiarRut(r) {
            return r ? r.toString().replace(/[^0-9kK]/g, '').toUpperCase() : "";
        }

        function formatearRut(r) {
            let s = limpiarRut(r);
            if (s.length <= 1) return s;
            let res = "-" + s.slice(-1);
            let cuerpo = s.slice(0, -1);
            while (cuerpo.length > 3) {
                res = "." + cuerpo.slice(-3) + res;
                cuerpo = cuerpo.slice(0, -3);
            }
            return cuerpo + res;
        }

        function handleInput(e) {
            let pos = e.target.selectionStart;
            let val = e.target.value;
            e.target.value = formatearRut(e.target.value);
            let diff = e.target.value.length - val.length;
            e.target.setSelectionRange(pos + diff, pos + diff);
        }

        async function buscar() {
            if (data.length === 0) data = await cargarCSV();
            const input = document.getElementById('rut').value.trim();
            const errorDiv = document.getElementById('error');
            const outDiv = document.getElementById('out');
            
            errorDiv.innerHTML = '';
            outDiv.innerHTML = '';

            const buscado = limpiarRut(input);
            if (buscado.length < 7) {
                errorDiv.innerHTML = 'Ingrese un RUT válido.';
                return;
            }

            const soloNum = buscado.slice(0, -1);
            const encontrado = data.find(x => {
                let r = limpiarRut(x.rut);
                return r === buscado || r === soloNum;
            });

            if (encontrado) {
                outDiv.innerHTML = `
                    <strong>Nombre:</strong> ${encontrado.nombreCompleto}<br>
                    <strong>Pagos Realizados 2026:</strong> <span class="pago-valor">$${encontrado.pagos.toLocaleString('es-CL')}</span><br>
                    <strong>Deuda Vencida:</strong> <span class="deuda-valor">$${encontrado.deuda.toLocaleString('es-CL')}</span>
                `;
            } else {
                outDiv.innerHTML = '<span style="color: #666;">RUT no encontrado.</span>';
            }
        }

        function limpiar() {
            document.getElementById('rut').value = '';
            document.getElementById('error').innerHTML = '';
            document.getElementById('out').innerHTML = '';
        }

        window.onload = async () => {
            data = await cargarCSV();
            document.getElementById('rut').addEventListener('input', handleInput);
        };
    </script>
</head>
<body>

<header>
    <img width="120" src="Logo.jpg" alt="Logo" onerror="this.style.display='none'">
    <h2>Respetable Logia Adeodato García Valenzuela N°122</h2>
    <p>Módulo de Consulta de Saldo</p>
</header>

<div class="container">
    <input type="text" id="rut" placeholder="RUT (ej: 12.345.678-K)" spellcheck="false">
    <button class="btn-buscar" onclick="buscar()">Consultar</button>
    <button class="btn-limpiar" onclick="limpiar()">Nueva Consulta</button>
    
    <div id="error"></div>
    <div id="out"></div>

    <div id="info-csv" class="archivo-info">Cargando datos...</div>
</div>

</body>
</html>
